<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>窩客商務中心 SEO 文章產生器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 680px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #111;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    label {
      font-size: 12px;
      color: #666;
      display: block;
      margin-bottom: 5px;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 9px 11px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #111;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input[type="text"]:focus {
      border-color: #3b82f6;
    }
    .keyword-row {
      margin-bottom: 1.25rem;
    }
    button.generate {
      width: 100%;
      padding: 11px;
      font-size: 15px;
      font-weight: 600;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 1.5rem;
    }
    button.generate:hover { background: #1d4ed8; }
    button.generate:disabled { background: #93c5fd; cursor: not-allowed; }
    .loading {
      display: none;
      text-align: center;
      padding: 2rem;
      color: #888;
      font-size: 14px;
    }
    .result { display: none; }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .result-header span { font-size: 12px; color: #888; }
    button.copy {
      font-size: 12px;
      padding: 5px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      color: #333;
    }
    button.copy:hover { background: #f0f0f0; }
    #articleContent {
      background: #f9f9f9;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 1.25rem;
      font-size: 14px;
      line-height: 1.85;
      white-space: pre-wrap;
      max-height: 540px;
      overflow-y: auto;
      color: #222;
    }
    .copy-msg {
      display: none;
      font-size: 12px;
      color: #16a34a;
      text-align: center;
      margin-top: 6px;
    }
    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="card">
  <h1>窩客商務中心 ✦ SEO 文章產生器</h1>
  <p class="subtitle">選擇設定，一鍵產出適合發布的 SEO 文章</p>

  <div class="grid">
    <div>
      <label>文章主題</label>
      <select id="topic">
        <option value="virtual-office">虛擬辦公室介紹</option>
        <option value="company-setup">公司登記流程</option>
        <option value="meeting-room">會議室出租</option>
        <option value="startup-savings">創業省錢攻略</option>
        <option value="address-benefits">地址登記好處</option>
        <option value="accounting">會計稅務服務</option>
        <option value="coworking-compare">共享辦公空間比較</option>
      </select>
    </div>
    <div>
      <label>目標地區</label>
      <select id="region">
        <option value="台北">台北</option>
        <option value="板橋">板橋</option>
        <option value="新北">新北</option>
        <option value="雙北地區">雙北地區</option>
      </select>
    </div>
    <div>
      <label>目標對象</label>
      <select id="audience">
        <option value="新創業者">新創業者</option>
        <option value="自由工作者">自由工作者</option>
        <option value="中小企業主">中小企業主</option>
        <option value="電商賣家">電商賣家</option>
      </select>
    </div>
    <div>
      <label>文章風格</label>
      <select id="style">
        <option value="實用教學">實用教學</option>
        <option value="比較分析">比較分析</option>
        <option value="常見問題">常見問題（FAQ）</option>
        <option value="省錢技巧">省錢技巧</option>
      </select>
    </div>
  </div>

  <div class="keyword-row">
    <label>額外關鍵字（選填，用逗號分隔）</label>
    <input type="text" id="keywords" placeholder="例：捷運旁、價格實惠、即刻入駐">
  </div>

  <button class="generate" id="generateBtn" onclick="generateArticle()">產生 SEO 文章</button>

  <div class="loading" id="loading">AI 正在撰寫文章，請稍候...</div>

  <div class="result" id="result">
    <div class="result-header">
      <span>產出文章</span>
      <button class="copy" onclick="copyArticle()">複製全文</button>
    </div>
    <div id="articleContent"></div>
    <div class="copy-msg" id="copyMsg">已複製到剪貼簿！</div>
  </div>
</div>

<script>
const topicData = {
  'virtual-office':    { title: '虛擬辦公室介紹',   keywords: '虛擬辦公室、地址登記、借址登記、公司地址、虛擬地址' },
  'company-setup':     { title: '公司登記流程',      keywords: '公司設立、工商登記、公司登記流程、營業登記、公司行號設立' },
  'meeting-room':      { title: '會議室出租',        keywords: '會議室出租、會議室租借、臨時會議室、商務會議室、場地租借' },
  'startup-savings':   { title: '創業省錢攻略',      keywords: '創業省錢、低成本創業、創業費用、節省創業成本' },
  'address-benefits':  { title: '地址登記好處',      keywords: '地址登記、公司地址登記、借址優點、登記地址好處' },
  'accounting':        { title: '會計稅務服務',      keywords: '會計服務、記帳報稅、稅務申報、節稅規劃、會計師服務' },
  'coworking-compare': { title: '共享辦公空間比較',  keywords: '共享辦公室、共同工作空間、商務中心比較、辦公室選擇' }
};

const styleGuide = {
  '實用教學':  '採用「步驟說明」格式，用數字列出流程，語氣親切易懂，適合初次接觸的讀者',
  '比較分析':  '採用「優缺點比較」或「方案對比」格式，客觀分析不同選項，幫助讀者做決策',
  '常見問題':  '採用「Q&A 問答」格式，列出5-6個常見問題並詳細回答，小標題用問句呈現',
  '省錢技巧':  '著重「省錢、划算、CP值」角度切入，列出具體省錢方法與數字，語氣積極'
};

async function generateArticle() {
  const topic    = document.getElementById('topic').value;
  const region   = document.getElementById('region').value;
  const audience = document.getElementById('audience').value;
  const style    = document.getElementById('style').value;
  const extraKW  = document.getElementById('keywords').value;

  const { title, keywords } = topicData[topic];
  const extraPart = extraKW ? `，以及「${extraKW}」` : '';

  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('generateBtn').disabled = true;

  const prompt = `你是一位專精台灣中小企業市場的SEO文章撰寫專家。

請為「窩客商務中心」（網址：workspace.com.tw）撰寫一篇繁體中文SEO文章。

【窩客商務中心服務介紹】
- 位於台北、板橋、新北，鄰近捷運站
- 提供：虛擬辦公室（地址登記）、實體辦公室出租、會議室出租、公司設立代辦、會計稅務服務
- 特色：即租即用、環境明亮舒適、交通便利、一站式創業服務、超過千位創業者選擇

【文章設定】
- 主題：${region}${title}
- 目標讀者：${audience}
- 文章風格：${style}（${styleGuide[style]}）
- 目標關鍵字：${keywords}${extraPart}

【撰寫要求】
1. 文章長度：約800-1000字
2. 開頭標題含主關鍵字
3. 依照「${style}」風格撰寫段落結構
4. 自然融入關鍵字，不要刻意堆砌
5. 結尾加入 CTA，引導讀者聯繫窩客商務中心或前往 workspace.com.tw
6. 全篇口吻適合「${audience}」閱讀

請直接輸出文章內容，不需要額外說明。`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const article = data.content.map(i => i.text || '').join('');
    document.getElementById('articleContent').textContent = article;
    document.getElementById('result').style.display = 'block';
  } catch (err) {
    document.getElementById('articleContent').textContent = '發生錯誤，請稍後再試。';
    document.getElementById('result').style.display = 'block';
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('generateBtn').disabled = false;
}

function copyArticle() {
  const text = document.getElementById('articleContent').textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copyMsg').style.display = 'block';
    setTimeout(() => document.getElementById('copyMsg').style.display = 'none', 2000);
  });
}
</script>
</body>
</html>
